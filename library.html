<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B00">
  <title>STC Library — SWMS, Toolbox Talks, Quick Reference</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #FAFAF7;
      --bg-card: #FFFFFF;
      --bg-subtle: #F0F0EB;
      --text: #0A0A0A;
      --text-muted: #6B6B68;
      --border: #E5E5E0;
      --border-strong: #2A2A28;
      --accent: #FF6B00;
      --accent-hover: #E55D00;
      --success: #16803C;
      --danger: #C72525;
      --warning: #B45309;
      --radius: 6px;
      --radius-sm: 4px;
      --shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Manrope', -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* Hi-vis stripe */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: repeating-linear-gradient(
        45deg,
        var(--accent) 0, var(--accent) 12px,
        var(--text) 12px, var(--text) 24px
      );
      z-index: 100;
    }

    /* ========== HEADER ========== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 28px 16px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .brand-tag {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .back-link:hover { color: var(--accent); }

    /* ========== TAB NAVIGATION ========== */
    .tabs {
      display: flex;
      gap: 0;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 28px;
      border-bottom: 2px solid var(--border-strong);
      position: sticky;
      top: 6px;
      background: var(--bg);
      z-index: 50;
    }

    .tab {
      background: none;
      border: none;
      padding: 14px 24px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 4px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
    }

    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    /* ========== LAYOUT ========== */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 28px 80px;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      padding-right: 24px;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 12px;
      padding-left: 12px;
    }

    .category-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .category-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px;
      background: none;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      transition: all 0.15s;
    }

    .category-btn:hover {
      background: var(--bg-subtle);
    }

    .category-btn.active {
      background: var(--text);
      color: white;
    }

    .category-btn .icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .category-btn .label {
      flex: 1;
      font-weight: 500;
    }

    /* ========== CONTENT ========== */
    .content {
      padding-left: 32px;
      min-width: 0;
    }

    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border-strong);
    }

    .content-title-block {
      flex: 1;
    }

    .content-eyebrow {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .content-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 0.05em;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: var(--accent-hover); }
    .copy-btn.copied {
      background: var(--success);
    }

    /* ========== DOCUMENT CONTENT STYLING ========== */
    .doc-meta {
      background: var(--bg-subtle);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 6px 18px;
      font-size: 13px;
    }

    .doc-meta strong {
      color: var(--text-muted);
      font-weight: 600;
    }

    .content-body h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.03em;
      margin: 28px 0 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .content-body h3:first-child { border-top: none; padding-top: 0; margin-top: 0; }

    .content-body h4 {
      font-size: 15px;
      font-weight: 700;
      margin: 16px 0 8px;
      color: var(--text);
    }

    .content-body p { margin-bottom: 12px; }

    .content-body ul, .content-body ol {
      margin: 8px 0 16px 24px;
    }

    .content-body li { margin-bottom: 6px; }

    .content-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 20px;
      font-size: 14px;
    }

    .content-body th {
      background: var(--bg-subtle);
      text-align: left;
      padding: 10px 12px;
      font-weight: 700;
      border-bottom: 2px solid var(--border-strong);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .content-body td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .content-body tr:hover td { background: var(--bg-subtle); }

    .risk-high { color: var(--danger); font-weight: 700; }
    .risk-medium { color: var(--warning); font-weight: 600; }
    .risk-low { color: var(--success); font-weight: 500; }

    .callout {
      background: #FEF7ED;
      border-left: 4px solid var(--warning);
      padding: 12px 16px;
      margin: 16px 0;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: 14px;
    }

    .callout.danger {
      background: #FEF2F2;
      border-left-color: var(--danger);
    }

    .callout strong { display: block; margin-bottom: 4px; }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 880px) {
      .layout {
        grid-template-columns: 1fr;
        padding: 16px 16px 60px;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding-right: 0;
        padding-bottom: 16px;
        margin-bottom: 24px;
      }

      .category-list {
        flex-direction: row;
        overflow-x: auto;
        gap: 6px;
        padding-bottom: 4px;
      }

      .category-btn {
        white-space: nowrap;
        flex-shrink: 0;
      }

      .content { padding-left: 0; }
      .content-title { font-size: 28px; }
      .header { padding: 20px 16px 12px; }
      .tabs { padding: 0 16px; }
      .tab { padding: 12px 16px; font-size: 18px; }
    }

    @media print {
      body::before, .header, .tabs, .sidebar, .copy-btn, .back-link { display: none !important; }
      .layout { grid-template-columns: 1fr; padding: 0; }
      .content { padding: 0; }
      .content-body { font-size: 12px; }
    }

    /* Toast notification for copy */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: white;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s ease;
      z-index: 200;
    }

    .toast.shown {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="brand">
      <div class="brand-name">STC</div>
      <div class="brand-tag">Library</div>
    </div>
    <a href="/" class="back-link">← STC home</a>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="swms">SWMS</button>
    <button class="tab" data-tab="toolbox">Toolbox Talks</button>
    <button class="tab" data-tab="reference">Quick Reference</button>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-title" id="sidebarTitle">Documents</div>
      <div class="category-list" id="categoryList"></div>
    </aside>

    <main class="content">
      <div class="content-header">
        <div class="content-title-block">
          <div class="content-eyebrow" id="contentEyebrow">—</div>
          <h1 class="content-title" id="contentTitle">—</h1>
        </div>
        <button class="copy-btn" id="copyBtn">📋 Copy Text</button>
      </div>
      <article class="content-body" id="contentBody"></article>
    </main>
  </div>

  <div class="toast" id="toast">Copied to clipboard</div>

  <script>
  /* ========================================================
     LIBRARY DATA — all SWMS, toolbox talks, and reference
     Edit this object to change content. No backend needed.
     ======================================================== */
  const library = {

    /* ====================================================
       TOOLBOX TALKS — read out at start of shift, 3-4 mins
       ==================================================== */
    toolbox: [
      {
        id: 'night',
        icon: '🌙',
        title: 'Night Works',
        content: `
          <div class="callout"><strong>When to use this</strong>Any shift starting after sunset or finishing before sunrise. Read out before shift starts. 3–4 minutes.</div>

          <h3>What we're doing tonight</h3>
          <ul>
            <li>Traffic control for [contractor] roadworks on [road / site]</li>
            <li>Stop/slow control, signage management, lane closure</li>
            <li>Start [time] → finish [time]</li>
          </ul>

          <h3>Hazards specific to night</h3>
          <ul>
            <li><strong>Reduced visibility</strong> — drivers physically can't see us as well, regardless of how much hi-vis we're wearing</li>
            <li><strong>Driver fatigue</strong> — late-night drivers are more inattentive, slower to react</li>
            <li><strong>Drink and drug drivers</strong> — significantly more common after 10pm</li>
            <li><strong>Glare</strong> — oncoming headlights can blind us at the wrong moment</li>
            <li><strong>Cold + our own fatigue</strong> — slower reactions, judgment errors, easier to make mistakes</li>
            <li><strong>Sudden weather</strong> — fog, dew on signs, dropping temps</li>
          </ul>

          <h3>How we manage it</h3>
          <ul>
            <li>Hi-vis Class D/N minimum (reflective top AND pants), buttoned up</li>
            <li>Headtorches on, red mode if available — preserves night vision</li>
            <li>Position behind the buffer / TMA wherever possible</li>
            <li>Never stand on the painted line — always behind the protective taper</li>
            <li><strong>Don't turn your back to traffic. Ever.</strong></li>
            <li>Keep moving — don't go static for long, both for warmth and for visibility</li>
            <li>Watch each other — buddy system, especially anyone new to nights</li>
          </ul>

          <h3>If a vehicle doesn't slow down</h3>
          <ul>
            <li><strong>Get off the road.</strong> Don't try to wave them down or block them.</li>
            <li>Move sideways AWAY from the direction of traffic flow, not parallel to it</li>
            <li>Radio call: <em>"Vehicle not stopping, [direction]"</em></li>
            <li>We'd rather lose a lane closure than lose a person. No exceptions.</li>
          </ul>

          <h3>Reminders</h3>
          <ul>
            <li>Proper feed before shift — not just energy drinks</li>
            <li>Hydrate even though it's cold (cold weather still dehydrates)</li>
            <li>30-min break every 4 hours, mandatory</li>
            <li>If you feel fatigued, <strong>you call it.</strong> Nobody gets in trouble for standing down.</li>
          </ul>

          <h3>Before we start — quick check</h3>
          <ul>
            <li>Everyone got a working headtorch?</li>
            <li>Radio comms tested?</li>
            <li>Anyone on medication affecting alertness?</li>
            <li>First-time night worker? Buddy them up.</li>
          </ul>
        `
      },

      {
        id: 'urban',
        icon: '🚗',
        title: 'Urban / Suburban Roadworks',
        content: `
          <div class="callout"><strong>When to use this</strong>Street works in residential or commercial areas, school streets, suburban arterials (50–60 km/h zones).</div>

          <h3>What we're doing today</h3>
          <ul>
            <li>Traffic control on [road / site] for [contractor / job type]</li>
            <li>Stop/slow control, lane closure, driveway management</li>
            <li>Start [time] → finish [time]</li>
          </ul>

          <h3>Hazards specific to urban work</h3>
          <ul>
            <li><strong>Pedestrians appearing without warning</strong> — kids, dogs, people on phones, elderly</li>
            <li><strong>Drivers accessing driveways</strong> through the worksite</li>
            <li><strong>Parked cars</strong> blocking sight lines</li>
            <li><strong>Cyclists and scooters</strong> weaving through traffic</li>
            <li><strong>Distracted drivers</strong> — locals know the road, switch off mentally</li>
            <li><strong>Verbal abuse from impatient drivers / residents</strong></li>
            <li><strong>Tradies in utes</strong> doing dumb shit to get through</li>
          </ul>

          <h3>How we manage it</h3>
          <ul>
            <li>Position to see driveways AND traffic flow at the same time</li>
            <li>Eye contact with every driver before signalling — assume they haven't seen you</li>
            <li>Hand signals slow, clear, unambiguous</li>
            <li>Watch parked cars for kids hidden behind them</li>
            <li>Never stand between two parked cars</li>
            <li>If a driveway exits inside the worksite, station someone there</li>
          </ul>

          <h3>If someone gets aggressive</h3>
          <ul>
            <li><strong>Do not engage.</strong> Don't argue back.</li>
            <li>Step back, radio for the site supervisor</li>
            <li>"Sorry mate, I just do what I'm told" works every time</li>
            <li>Take a rego if they're abusive — admin/legal problem, not yours</li>
            <li>Aggressive driver = stop traffic immediately, let them through, get them off site</li>
          </ul>

          <h3>Before we start — quick check</h3>
          <ul>
            <li>Everyone know where the driveways are?</li>
            <li>Anyone got pedestrians in their sector they need to watch for?</li>
            <li>Radios working?</li>
            <li>Anyone first time on urban work?</li>
          </ul>
        `
      },

      {
        id: 'footpath',
        icon: '🚶',
        title: 'Footpath / Pedestrian Works',
        content: `
          <div class="callout"><strong>When to use this</strong>Any job where the public is walking through or around your worksite.</div>

          <h3>What we're doing today</h3>
          <ul>
            <li>Footpath or kerb works on [location]</li>
            <li>Maintaining safe pedestrian passage past the worksite</li>
            <li>Start [time] → finish [time]</li>
          </ul>

          <h3>Hazards specific to pedestrian work</h3>
          <ul>
            <li><strong>Pedestrians are the protected ones here</strong>, not vehicles — flip your mindset</li>
            <li><strong>Wheelchairs, prams, walkers</strong> need flat continuous path (no cables, no spoil)</li>
            <li><strong>Vision-impaired people</strong> rely on tactile cues — guide them if needed</li>
            <li><strong>Kids</strong> treating barriers as obstacle course</li>
            <li><strong>People on phones</strong> walking straight into stuff</li>
            <li><strong>Pedestrians ignoring detour signage</strong> and pushing through anyway</li>
          </ul>

          <h3>How we manage it</h3>
          <ul>
            <li><strong>Continuous barriers</strong> — not just spaced cones — so blind pedestrians can follow</li>
            <li>Detour signage at eye level, not knee level</li>
            <li>Clear, smooth alternative path — no trip hazards, no steps if avoidable</li>
            <li>Detour shouldn't add more than 50m unless unavoidable</li>
            <li>If kids hanging around the site, ask the spotter to politely move them on</li>
            <li>If someone's vision-impaired and confused, <strong>offer to guide them</strong> — ask first, don't grab</li>
          </ul>

          <h3>Legal stuff worth knowing</h3>
          <ul>
            <li>DDA (Disability Discrimination Act) means our path has to work for everyone</li>
            <li>Failure to provide accessible detour = legal exposure for the principal contractor</li>
            <li>If you genuinely can't make it accessible, escalate to supervisor — don't just hope</li>
          </ul>

          <h3>Before we start — quick check</h3>
          <ul>
            <li>Have we walked the detour ourselves to test it?</li>
            <li>Any narrow points where wheelchair won't fit?</li>
            <li>Sight lines OK for visually impaired (no overhead hazards at head height)?</li>
            <li>Anyone with rapport already with the local shops/residents?</li>
          </ul>
        `
      },

      {
        id: 'driveway',
        icon: '🏠',
        title: 'Driveway / Property Access',
        content: `
          <div class="callout"><strong>When to use this</strong>Works in front of homes, businesses, or anywhere vehicles need to enter/exit the worksite zone.</div>

          <h3>What we're doing today</h3>
          <ul>
            <li>Roadworks where multiple driveways enter the worksite</li>
            <li>Managing resident and business vehicle access through the closure</li>
            <li>Start [time] → finish [time]</li>
          </ul>

          <h3>Hazards specific to driveway work</h3>
          <ul>
            <li><strong>Vehicles reversing blind</strong> out of driveways — they can't see the worksite</li>
            <li><strong>Residents expecting access at all times</strong> — frustration builds fast</li>
            <li><strong>Elderly drivers flustered</strong> by changed conditions, may make sudden moves</li>
            <li><strong>Kids and pets</strong> in driveways</li>
            <li><strong>Delivery trucks</strong> needing access (couriers, garbage, removalists)</li>
            <li><strong>Limited turning space</strong> — vehicles forced to reverse in or out</li>
          </ul>

          <h3>How we manage it</h3>
          <ul>
            <li><strong>Walk the worksite first</strong> — identify every driveway before crew starts</li>
            <li>Door-knock or note-drop residents the morning of, if possible</li>
            <li>Spotter at each driveway when vehicles approach</li>
            <li><strong>Walk every vehicle in and out</strong> — never let them self-navigate through the site</li>
            <li>Stop traffic flow temporarily for residents — it's a 10-second job</li>
            <li>Clear hand signal: "Stop... clear... go." No ambiguity.</li>
          </ul>

          <h3>If a resident is frustrated</h3>
          <ul>
            <li>Acknowledge first: "Yeah I get it, won't be long, I'll get you out in a sec"</li>
            <li>Don't promise what you can't deliver</li>
            <li>Never argue about whose fault the works are — that's not your job</li>
            <li>Escalate to supervisor if persistent</li>
          </ul>

          <h3>Before we start — quick check</h3>
          <ul>
            <li>Have we mapped every driveway?</li>
            <li>Anyone got mobility-impaired resident in their sector?</li>
            <li>Garbage / delivery day clash today?</li>
            <li>Are radios reaching all driveway spotters?</li>
          </ul>
        `
      },

      {
        id: 'school',
        icon: '🎒',
        title: 'School Zone Works',
        content: `
          <div class="callout"><strong>When to use this</strong>Any work within a marked school zone, especially around peak drop-off / pick-up times.</div>

          <h3>What we're doing today</h3>
          <ul>
            <li>Traffic control near [school name] during [school zone hours]</li>
            <li>40 km/h zone enforced, kids and parents in the area</li>
            <li>Start [time] → finish [time]</li>
          </ul>

          <h3>Hazards specific to school zones</h3>
          <ul>
            <li><strong>Kids — small, unpredictable, fast</strong> — can dart out from anywhere</li>
            <li><strong>Parent drop-off / pick-up chaos</strong> at 8:30am and 3:00pm</li>
            <li><strong>Bus zones</strong> — strict rules, do NOT block them</li>
            <li><strong>Crossing supervisors</strong> working their crossings — coordinate with them</li>
            <li><strong>Distracted parents</strong> on phones, late, stressed</li>
            <li><strong>Kids crossing at non-designated points</strong> if barriers funnel them wrong</li>
            <li><strong>Higher legal and media exposure</strong> if anything goes wrong near kids</li>
          </ul>

          <h3>How we manage it</h3>
          <ul>
            <li><strong>Check the school zone times</strong> before starting — they vary</li>
            <li><strong>Avoid the peak windows</strong> if at all possible — schedule around 8–9am and 2:45–3:30pm</li>
            <li><strong>Liaise with school admin first</strong> — give them notice, they may help</li>
            <li>Stay at MAXIMUM visibility during peak — every TC fully kitted, not slacking</li>
            <li><strong>Never block</strong> the school gate, crossing, or bus zone — ever</li>
            <li>Be polite to parents — they're stressed and time-pressured</li>

          </ul>

            <li>Get the kid to safety</li>
            <li>Notify supervisor, school, and (if injury) 000</li>
            <li>Don't engage with the kid's medical condition — that's paramedics' job</li>
            <li>Witness statements taken before anyone leaves</li>
          </ul>

          <h3>Before we start — quick check</h3>
          <ul>
            <li>What are the school zone times today?</li>
            <li>Have we coordinated with the school?</li>
            <li>Anyone uncomfortable working around kids? (Swap with them — no shame.)</li>
            <li>Are barriers funnelling kids to safe crossing points only?</li>
          </ul>

          <tr><td>7</td><td>Bitumen surface radiating heat (+5–10°C)</td><td>5</td><td>3</td><td class="risk-high">15 High</td><td class="risk-low">5 Low</td></tr>
          <tr><td>8</td><td>Reduced concentration leading to vehicle strike</td><td>3</td><td>5</td><td class="risk-high">15 High</td><td class="risk-low">5 Low</td></tr>
        </tbody>
      </table>

      <h3>6. Control measures</h3>

      <h4>6.1 Elimination</h4>
      <ul>
        <li>Schedule works outside peak heat hours (1100–1500) where principal contractor agrees.</li>
        <li><strong>Stop-work thresholds:</strong>
          <ul>
            <li><strong>35°C</strong> — increased break frequency, all controls active</li>
            <li><strong>40°C</strong> — supervisor considers suspending; activity-specific risk assessment</li>
            <li><strong>42°C+</strong> — work suspended unless critical and additional controls implemented</li>
          </ul>
        </li>
      </ul>

      <h4>6.2 Substitution</h4>
      <ul><li>Static signage in preference to manual stop/slow positions in extreme heat where conditions permit.</li></ul>

      <h4>6.3 Engineering controls</h4>
      <ul>
        <li><strong>Shade structures</strong> at every worker position — pop-up gazebo, vehicle awning, or building shadow.</li>
        <li><strong>Air-conditioned vehicle</strong> on site at all times for crew rotation.</li>
        <li><strong>Esky stocked with chilled water and electrolyte drinks</strong> — minimum 4L per worker per shift.</li>
        <li><strong>Cooling vests</strong> (where available) for sustained extreme heat exposure.</li>
        <li><strong>Wet rags / neck cooling towels</strong> on hand.</li>
      </ul>

      <h4>6.4 Administrative controls</h4>
      <ul>
        <li>Pre-shift forecast check — BOM temperature, humidity, UV index, heatwave warnings.</li>
        <li><strong>Heat index calculated</strong> (temperature + humidity) — controls scale with index, not raw temperature.</li>
        <li><strong>15-minute mandatory break every 45 minutes</strong> at temperatures above 35°C; <strong>10 minutes every 30 minutes</strong> above 40°C.</li>
        <li><strong>Buddy system</strong> — workers check each other for early heat illness signs every 30 minutes.</li>
        <li>Hydration verified pre-shift — each worker has minimum 4L of fluids.</li>
        <li>Medication check — workers on antihistamines, blood pressure medication, or diuretics flagged to supervisor (these increase heat risk).</li>
        <li>Toolbox talk (STC-TBT-007) delivered and signed.</li>
        <li>Heat illness recognition briefed — signs and symptoms of heat exhaustion vs heat stroke.</li>
      </ul>

      <h4>6.5 PPE</h4>
      <ul>
        <li>High-visibility Class D/N garment — <strong>lightweight, breathable, vented where AS-compliant options exist</strong></li>
        <li>Light-coloured shirts under hi-vis where colour permitted by AS standards</li>
        <li>Broad-brim attachment to hard hat (or legionnaire-style flap)</li>
        <li><strong>Sunscreen SPF 50+ reapplied every 2 hours minimum</strong></li>
        <li>UV-rated sunglasses (AS/NZS 1067)</li>
        <li>Safety footwear (steel cap, ankle support, lightweight where compliant)</li>
        <li>Hard hat (AS/NZS 1801) — light colour to reduce heat absorption</li>
        <li>Lightweight gloves</li>
      </ul>

      <h3>7. Emergency procedures</h3>

      <h4>Heat exhaustion (manageable)</h4>
      <p><strong>Signs:</strong> pale skin, heavy sweating, dizziness, headache, nausea, weakness</p>
      <ol>
        <li>Remove worker from heat immediately to shade or air-conditioning</li>
        <li>Loosen clothing; cool with wet rag on neck and wrists</li>
        <li>Cool drinks (water + electrolytes); not iced</li>
        <li>Rest minimum 20 minutes</li>
        <li>Do not return to active duty until symptoms fully resolved</li>
        <li>Document via incident report</li>
      </ol>

      <h4>Heat stroke (medical emergency)</h4>
      <p><strong>Signs:</strong> red dry skin (sweating may have stopped), confusion, slurred speech, hot to touch, rapid pulse, possible collapse or seizure</p>
      <ol>
        <li><strong>Call 000 immediately</strong></li>
        <li>Aggressive cooling — remove excess clothing, wet entire body, fan vigorously, ice packs to neck/armpits/groin if available</li>
        <li><strong>Do not give water if confused or vomiting</strong></li>
        <li>Monitor breathing and pulse; CPR if pulse stops</li>
        <li>Notify principal contractor; SafeWork NSW notification likely required</li>
      </ol>

      <h4>Severe heatwave declared</h4>
      <ol>
        <li>Supervisor reviews forecast and conditions</li>
        <li>Stop-work decision documented; principal contractor notified</li>
        <li>If continuing, additional controls (extra breaks, additional crew rotation) documented</li>
      </ol>

      <h3>8. Responsibilities</h3>
      <ul>
        <li><strong>Luke Heiser</strong> — pre-shift heat assessment, stop-work decision authority, PPE and hydration provision, briefing on heat illness recognition.</li>
        <li><strong>Each worker</strong> — hydration before and during shift, immediate report of own symptoms or those of buddy, medication disclosure, PPE compliance.</li>
        <li><strong>Principal contractor</strong> — schedule negotiation, provision of shade structures and air-conditioned shelter, escalation pathway.</li>
      </ul>

      <h3>9. Sign-on register</h3>
      <table>
        <thead><tr><th>Date</th><th>Worker name</th><th>Signature</th><th>TPWD #</th><th>Heat-tolerance meds?</th><th>Acknowledgment</th></tr></thead>
        <tbody>
          <tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>Y / N</td><td>I have read and understood this SWMS and agree to follow all controls</td></tr>
        </tbody>
      </table>

      <h3>10. Review trigger</h3>
      <p>Reviewed if: any heat-related illness incident, heatwave event response, legislation changes, SafeWork NSW guidance update, 12 months elapsed.</p>
    `
  };

  /* ========================================================
     APP LOGIC — tab switching, rendering, copy
     ======================================================== */

  const $ = (id) => document.getElementById(id);

  const state = {
    tab: 'swms',
    selectedId: null
  };

  const tabLabels = {
    swms: 'SWMS',
    toolbox: 'Toolbox Talks',
    reference: 'Quick Reference'
  };

  // Tab switching
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      state.tab = btn.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === btn));
      renderSidebar();
      // Select first item in the new tab
      selectItem(library[state.tab][0].id);
    });
  });

  function renderSidebar() {
    const list = $('categoryList');
    list.innerHTML = '';
    $('sidebarTitle').textContent = tabLabels[state.tab];

    library[state.tab].forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'category-btn';
      if (item.id === state.selectedId) btn.classList.add('active');
      btn.innerHTML = `<span class="icon">${item.icon}</span><span class="label">${item.title}</span>`;
      btn.addEventListener('click', () => selectItem(item.id));
      list.appendChild(btn);
    });
  }

  function selectItem(id) {
    state.selectedId = id;
    const item = library[state.tab].find(i => i.id === id);
    if (!item) return;

    $('contentEyebrow').textContent = item.docNum
      ? `${tabLabels[state.tab]} · ${item.docNum}`
      : tabLabels[state.tab];
    $('contentTitle').textContent = item.title;
    $('contentBody').innerHTML = item.content;

    // Update sidebar active state
    document.querySelectorAll('.category-btn').forEach((btn, i) => {
      btn.classList.toggle('active', library[state.tab][i].id === id);
    });

    // Scroll content to top on selection
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ========================================================
     COPY BUTTON — extracts plain text from current content
     ======================================================== */
  $('copyBtn').addEventListener('click', async () => {
    const body = $('contentBody');
    const title = $('contentTitle').textContent;

    // Strip HTML tags, preserve structure as plain text
    const text = htmlToPlainText(body.innerHTML);
    const fullText = `${title}\n${'='.repeat(title.length)}\n\n${text}`;

    try {
      await navigator.clipboard.writeText(fullText);
      showToast('Copied to clipboard');
      const btn = $('copyBtn');
      btn.classList.add('copied');
      btn.textContent = '✓ Copied';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.textContent = '📋 Copy Text';
      }, 2000);
    } catch (err) {
      showToast('Copy failed — try again');
      console.error(err);
    }
  });

  function htmlToPlainText(html) {
    // Create a temporary element to parse HTML
    const tmp = document.createElement('div');
    tmp.innerHTML = html;

    // Walk through and convert to clean text with structure
    let text = '';
    function walk(node, depth = 0) {
      for (const child of node.childNodes) {
        if (child.nodeType === Node.TEXT_NODE) {
          text += child.textContent;
        } else if (child.nodeType === Node.ELEMENT_NODE) {
          const tag = child.tagName.toLowerCase();
          if (tag === 'h3') {
            text += '\n\n' + child.textContent.toUpperCase() + '\n' + '-'.repeat(child.textContent.length) + '\n';
          } else if (tag === 'h4') {
            text += '\n\n' + child.textContent + '\n';
          } else if (tag === 'li') {
            text += '\n• ' + child.textContent.trim();
          } else if (tag === 'p') {
            text += '\n\n' + child.textContent;
          } else if (tag === 'tr') {
            const cells = Array.from(child.querySelectorAll('td, th')).map(c => c.textContent.trim());
            text += '\n' + cells.join(' | ');
          } else if (tag === 'table') {
            walk(child, depth + 1);
            text += '\n';
          } else {
            walk(child, depth + 1);
          }
        }
      }
    }
    walk(tmp);

    // Clean up excessive whitespace
    return text.replace(/\n{3,}/g, '\n\n').trim();
  }

  function showToast(message) {
    const toast = $('toast');
    toast.textContent = message;
    toast.classList.add('shown');
    setTimeout(() => toast.classList.remove('shown'), 2000);
  }

  /* ========================================================
     INITIAL LOAD — show first SWMS by default
     ======================================================== */
  state.selectedId = library.swms[0].id;
  renderSidebar();
  selectItem(library.swms[0].id);

  </script>
